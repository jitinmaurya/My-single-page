<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Page Web</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        header {
            background: #002395; /* Bleu Blanc Rouge - Bleu */
            color: white;
            padding: 2rem 0;
        }
        main {
            padding: 2rem;
            max-width: 800px;
            margin: auto;
        }
        .btn {
            display: inline-block;
            background: #ed2939; /* Bleu Blanc Rouge - Rouge */
            color: white;
            padding: 0.7rem 1.5rem;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 1rem;
            font-weight: bold;
        }
        .btn:hover {
            background: #c21825;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bienvenue sur mon site web !</h1>
        <p>Créé facilement avec GitHub Pages sur mobile.</p>
    </header>

    <main>
        <h2>Bonjour tout le monde</h2>
        <p>Ceci est une page simple écrite en français. Vous pouvez modifier ce texte pour ajouter vos propres informations, projets ou portfolio.</p>
        
        <a href="#" class="btn">Cliquez ici</a>
    </main>

</body>
</html>
